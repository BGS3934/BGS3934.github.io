      <a-assets>
        <a-asset-item id="car-model.glb" src="car-model.glb"></a-asset-item>
        <img id="grass" src="download.jpg" crossorigin="anonymous">
      <a-asset-item id="car garage" src="Tremendous Robo-Albar.glb"></a-asset-item>
      <a-asset-item id="big tall building" src="Copy of The Empire State Building.glb"></a-asset-item>
      <a-asset-item id="Charger" src="Smashing Inari-Vihelmo.glb"></a-asset-item>
    </a-assets>

      <!-- Tiled grass plane (enlarged): repeat scaled so individual tiles keep same size -->
      <!-- Plane now 1000×1000; repeat scaled from 24→240 to preserve tile size (100->1000 = ×10) -->
      <a-plane rotation="-90 0 0" width="1000" height="1000" material="src: #grass; repeat: 240 240; side: double" static-body="shape: box"></a-plane>

      <!-- Player camera with kinematic collision controller (raycast-based) -->
      <a-entity id="player" kinematic-controls="speed:8">
        <!-- Invisible box collider around the player so the camera has a bounding volum6
             Camera sits inside this box; the box is not rendered but provides stable dimensions. -->
        <a-box id ="playerCollider" width="0.4" height="1.6" depth="0.4" position="0 0.8 0" visible="false"></a-box>
        <a-camera id="camera" position="0 1.6 0" look-controls></a-camera>
      </a-entity>
     
      <a-entity id="House" position="0 0 20" >
      <!-- House: main box -->
      <a-box position="3 1.25 -6" width="4" height="2.5" depth="4" color="#CD853F" src="brick  texture.webp"></a-box>
      <!-- Pyramid roof: cone with 4 radial segments (rotated 45° around Y) -->
      <a-cone position="3 3.5 -6" radius-bottom="2.5" height="2" color="#8B4513" segments-radial="4" rotation="0 45 0" src="roof.webp"></a-cone>
      <!-- Door and one window on the front face (left window removed) -->
      <a-box position="3.5 0.75 -8.01" width="1" height="1.5" depth="0.05" color="#654321" src="door.webp"></a-box>
      <a-box position="2 1.6 -8.01" width="1.2" height="1.2" depth="0.05" color="#87CEEB" src="window texture.webp"></a-box>
    </a-entity>

    <!-- Auto-enable static-body on scene objects (trees/houses/walls) after scene loads -->
    <script>
      window.addEventListener('load', function(){
        var scene = document.querySelector('a-scene');
        if(!scene) return;
        scene.addEventListener('loaded', function(){
          // Add static-body to all wall/box/plane elements
          document.querySelectorAll('a-box, a-plane').forEach(function(el){
            if(!el.hasAttribute('static-body')) el.setAttribute('static-body', '');
          });
          // Add static-body to parent entities that contain geometry children (trees) or are houses
          document.querySelectorAll('a-entity').forEach(function(el){
            if(el.id === 'House'){
              if(!el.hasAttribute('static-body')) el.setAttribute('static-body','');
            }
            // If entity contains a cylinder (our tree trunk), make it a static body
            if(el.querySelector && el.querySelector('a-cylinder')){
              if(!el.hasAttribute('static-body')) el.setAttribute('static-body','');
            }
          });
        });
      });
    </script>

    <!-- Kinematic movement + collision component: raycast-based blocking (no physics engine required) -->
    <script>
      AFRAME.registerComponent('kinematic-controls', {
        schema: { speed: { type: 'number', default: 8 } },
        init: function () {
          this.keys = {};
          var self = this;
          window.addEventListener('keydown', function (e) { self.keys[e.code] = true; });
          window.addEventListener('keyup', function (e) { self.keys[e.code] = false; });
          this.cameraEl = this.el.querySelector('a-camera') || document.querySelector('a-camera');
          this.forward = new THREE.Vector3();
          this.right = new THREE.Vector3();
          this.raycaster = new THREE.Raycaster();
          this.tempVec = new THREE.Vector3();
          // cast heights (feet, center, head)
          this.heights = [0.2, 0.8, 1.4];
          // lateral offsets to check (center, left, right)
          this.lateral = [0.0, -0.22, 0.22];
        },
        tick: function (time, dt) {
          var speed = this.data.speed;
          var moveX = 0, moveZ = 0;
          if (this.cameraEl && this.cameraEl.object3D) {
            this.cameraEl.object3D.getWorldDirection(this.forward);
            this.forward.y = 0; this.forward.normalize();
            this.right.crossVectors(this.forward, new THREE.Vector3(0,1,0)).normalize();
            if (this.keys['KeyW']) { moveX += this.forward.x; moveZ += this.forward.z; }
            if (this.keys['KeyS']) { moveX -= this.forward.x; moveZ -= this.forward.z; }
            if (this.keys['KeyA']) { moveX -= this.right.x; moveZ -= this.right.z; }
            if (this.keys['KeyD']) { moveX += this.right.x; moveZ += this.right.z; }
          } else {
            if (this.keys['KeyW']) moveZ -= 1;
            if (this.keys['KeyS']) moveZ += 1;
            if (this.keys['KeyA']) moveX -= 1;
            if (this.keys['KeyD']) moveX += 1;
          }
          var len = Math.sqrt(moveX*moveX + moveZ*moveZ);
          if (len < 0.001) return;
          moveX /= len; moveZ /= len;
          var dtSec = (dt || 16) / 1000;
          var distance = speed * dtSec;
          // compute desired movement vector in world space
          this.tempVec.set(moveX * distance, 0, moveZ * distance);
          var sceneObj = this.el.sceneEl.object3D;
          var dir = this.tempVec.clone().normalize();
          if (dir.length() === 0) return;

          // perform multiple raycasts (feet/center/head and center/left/right) to avoid slipping through thin obstacles
          var originWorld = new THREE.Vector3();
          this.el.object3D.getWorldPosition(originWorld);
          var blocked = false;
          var margin = 0.36; // safety margin

          for (var h = 0; h < this.heights.length && !blocked; h++){
            for (var l = 0; l < this.lateral.length && !blocked; l++){
              // compute origin for= this ray
              var origin = originWorld.clone();
              origin.y += this.heights[h];
              // apply lateral offset in world space
              var lateralOffset = this.right.clone().multiplyScalar(this.lateral[l]);
              origin.add(lateralOffset);
              // small forward offset so rays start just in front of player's box
              var forwardOffset = this.forward.clone().multiplyScalar(0.05);
              origin.add(forwardOffset);

              this.raycaster.set(origin, dir);
              var intersects = this.raycaster.intersectObjects(sceneObj.children, true);
              if (intersects && intersects.length) {
                for (var i = 0; i < intersects.length; i++){
                  var it = intersects[i];
                  if (!it.distance) continue;
                  var mesh = it.object;
                  var el = mesh.el;
                  if (el && (el === this.el || el === this.cameraEl)) continue;
                  if (it.distance < distance + margin) { blocked = true; break; }
                }
              }
            }
          }

          if (!blocked) {
            // apply movement by updating object's position
            var pos = this.el.getAttribute('position');
            if (!pos) pos = { x:0, y:0, z:0 };
            pos.x += this.tempVec.x;
            pos.z += this.tempVec.z;
            this.el.setAttribute('position', pos);
          }
        }
      });
    </script>

    <!-- Coordinate HUD -->
    <script>
      (function(){
        const coords = document.createElement('div');
        coords.id = 'coords-hud';
        Object.assign(coords.style, {
          position: 'fixed',
          right: '12px',
          bottom: '12px',
          padding: '6px 10px',
          background: 'rgba(0,0,0,0.6)',
          color: '#e6ffe6',
          fontFamily: 'monospace',
          fontSize: '13px',
          borderRadius: '4px',
          zIndex: 9999
        });
        document.body.appendChild(coords);

        function fmt(n){ return (Math.round(n*100)/100).toFixed(2); }

        function update(){
          // Prefer an explicit camera element if present, otherwise use scene camera
          const camEl = document.querySelector('[camera]') || document.querySelector('a-camera') || (AFRAME && AFRAME.scenes && AFRAME.scenes[0] && AFRAME.scenes[0].camera && AFRAME.scenes[0].camera.el);
          if(!camEl){ coords.textContent = 'camera: not ready'; return; }
          const pos = camEl.getAttribute('position') || camEl.object3D.position;
          const rot = camEl.getAttribute('rotation') || camEl.object3D.rotation;
          if(pos){
            coords.textContent = `pos: x:${fmt(pos.x)} y:${fmt(pos.y)} z:${fmt(pos.z)}\nrot: x:${fmt(rot.x)} y:${fmt(rot.y)} z:${fmt(rot.z)}`;
          }
        }

        // Update often so it looks responsive
        setInterval(update, 100);
        // Also update once when loaded
        window.addEventListener('load', update);
      })();
    </script>
